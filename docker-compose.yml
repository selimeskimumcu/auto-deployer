services:
  postgres:
    image: postgres:17
    container_name: autodeployer-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: autodeployer
      POSTGRES_USER: autodeployer
      POSTGRES_PASSWORD: development_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: